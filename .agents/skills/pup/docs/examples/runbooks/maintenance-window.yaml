name: maintenance-window
description: Scheduled maintenance — create monitor downtime, drain traffic, poll metric to near-zero, confirm, then delete downtime
tags:
  type: maintenance
  team: platform

vars:
  SERVICE:
    description: Service to put into maintenance
    required: true
  SCOPE:
    description: Monitor scope for the downtime (e.g., service:payments,env:production)
    required: true
  DURATION_MINUTES:
    description: Maintenance window duration in minutes
    default: "60"
  DOWNTIME_FILE:
    description: Path to downtime JSON body (created automatically)
    required: false
    default: /tmp/pup-downtime.json

steps:
  - name: Generate downtime JSON
    kind: shell
    run: |
      NOW=$(date +%s)
      END=$(( NOW + {{ DURATION_MINUTES }} * 60 ))
      cat > {{ DOWNTIME_FILE }} <<EOF
      {
        "data": {
          "type": "downtime",
          "attributes": {
            "scope": "{{ SCOPE }}",
            "message": "Scheduled maintenance for {{ SERVICE }}",
            "monitor_identifier": {"monitor_tags": ["{{ SCOPE }}"]},
            "schedule": {"start": $NOW, "end": $END}
          }
        }
      }
      EOF
      echo "Downtime JSON written to {{ DOWNTIME_FILE }}"

  - name: Create monitor downtime
    kind: pup
    run: downtime create --file={{ DOWNTIME_FILE }}
    capture: DOWNTIME_ID

  - name: Drain traffic (shell)
    kind: shell
    run: echo "Draining {{ SERVICE }} — update your load balancer here"

  - name: Poll request rate to near-zero
    kind: pup
    run: metrics query --query="sum:trace.{{ SERVICE }}.request.hits{{{ SCOPE }}}.as_count()" --from=5m
    poll:
      interval: 30s
      timeout: 10m
      until: value < 5
    on_failure: warn

  - name: Confirm ready for maintenance work
    kind: confirm
    message: "Traffic to {{ SERVICE }} is low. Proceed with maintenance tasks?"

  - name: Delete downtime when finished
    kind: pup
    run: downtime cancel {{ DOWNTIME_ID }}
    when: always
    on_failure: warn
