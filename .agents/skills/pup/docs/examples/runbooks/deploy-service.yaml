name: deploy-service
description: Deploy a service with SLO check, incident gate, Datadog Workflow trigger, monitor poll, and Slack notification
tags:
  type: deployment
  team: platform

vars:
  SERVICE:
    description: Service name to deploy (e.g., payments)
    required: true
  VERSION:
    description: Target version to deploy (e.g., 1.2.3)
    required: true
  ENV:
    description: Target environment
    default: production
  WORKFLOW_ID:
    description: Datadog Workflow ID for deployment automation
    required: false
    default: ""
  SLACK_WEBHOOK:
    description: Slack webhook URL for notifications (optional)
    required: false
    default: ""

steps:
  - name: Check SLO status before deploy
    kind: pup
    run: slos list
    assert:
      message: Verify SLOs look healthy before proceeding

  - name: Check for active incidents affecting service
    kind: pup
    run: incidents list --limit=10
    capture: INCIDENTS_JSON
    on_failure: warn

  - name: Confirm no blocking incidents
    kind: confirm
    message: "Review incident list above. Proceed with deploy of {{ SERVICE }} v{{ VERSION }} to {{ ENV }}?"

  - name: Trigger deployment workflow
    kind: datadog-workflow
    workflow_id: "{{ WORKFLOW_ID }}"
    inputs:
      service: "{{ SERVICE }}"
      version: "{{ VERSION }}"
      environment: "{{ ENV }}"
    when: always
    optional: true

  - name: Poll error rate monitor after deploy
    kind: pup
    run: monitors list --tags="service:{{ SERVICE }},env:{{ ENV }}"
    poll:
      interval: 30s
      timeout: 10m
      until: status == OK
    on_failure: warn

  - name: Notify Slack on success
    kind: shell
    run: |
      curl -s -X POST "{{ SLACK_WEBHOOK }}" \
        -H 'Content-type: application/json' \
        --data '{"text":"✅ Deployed {{ SERVICE }} v{{ VERSION }} to {{ ENV }}"}'
    optional: true
    when: always
